name: Publish packages

# Publishes all workspace packages when a version tag is pushed.
# Configure each @planvokter/* package on npmjs.com to trust this GitHub repo (OIDC).
# No NPM_TOKEN required when trusted publishing is enabled.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches workspace versions (stable release only)
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          ROOT_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$ROOT_VER" ]; then
            echo "::error::Git tag v$TAG_VER must equal root package.json version ($ROOT_VER). The tag name is what npm will publish — fix versions or retag."
            exit 1
          fi
          if [[ ! "$ROOT_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::This workflow only publishes stable semver (X.Y.Z). Root is '$ROOT_VER' (prerelease). Use release versions on the tagged commit, or add a separate prerelease workflow with npm --tag."
            exit 1
          fi
          for f in packages/*/package.json; do
            v=$(node -p "require('./$f').version")
            if [ "$v" != "$ROOT_VER" ]; then
              echo "::error::$f version $v != root $ROOT_VER"
              exit 1
            fi
          done
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test
      - name: Measure MCP token costs
        run: npm run measure-tokens:ci -w packages/riotplan-mcp-http
      - name: Upload token report
        uses: actions/upload-artifact@v4
        with:
          name: mcp-token-report-${{ github.ref_name }}
          path: packages/riotplan-mcp-http/mcp-token-report.json
          retention-days: 365
      - name: Publish all workspaces (provenance)
        run: |
          set -e
          for w in \
            packages/riotplan-verify \
            packages/riotplan-format \
            packages/riotplan-catalyst \
            packages/riotplan-cloud \
            packages/riotplan-templates \
            packages/riotplan-core \
            packages/riotplan-ai \
            packages/riotplan \
            packages/riotplan-mcp-http
          do
            echo "Publishing $w ..."
            npm publish -w "$w" --access public --provenance
          done
