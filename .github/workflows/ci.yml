name: CI

on:
  push:
    branches:
      - main
      - working
      - 'release/**'
      - 'feature/**'
      - 'dependabot/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test
